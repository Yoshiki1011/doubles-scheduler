<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // 背景
  ctx.fillStyle = '#1a5276';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fill();
  // 絵文字
  ctx.font = `${s * 0.6}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏓', s / 2, s / 2);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// ダウンロード
function download(id, name) {
  const a = document.createElement('a');
  a.href = document.getElementById(id).toDataURL('image/png');
  a.download = name;
  a.click();
}

download('c192', 'icon-192.png');
setTimeout(() => download('c512', 'icon-512.png'), 500);
</script>
</body>
</html>
